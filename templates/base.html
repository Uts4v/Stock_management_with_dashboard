{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Stock Management System{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    {% block extra_head %}{% endblock %}
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Top Navigation Bar with Global Search -->
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fas fa-boxes"></i>
            <span>Stock Manager</span>
        </div>
        <div class="nav-search">
            <input type="text" id="searchInput" placeholder="Search products..." 
                   value="{{ search|default:'' }}">
            <select id="categoryFilter">
                <option value="">All Categories</option>
                <!-- Categories will be populated dynamically -->
            </select>
            <button id="searchBtn" class="btn-search">
                <i class="fas fa-search"></i>
            </button>
        </div>
        <div class="nav-links">
            <a href="{% url 'index' %}" class="nav-link {% if request.path == '/' %}active{% endif %}">
                <i class="fas fa-th-large"></i>
                <span>Products</span>
            </a>
            <a href="{% url 'sales-history' %}" class="nav-link {% if 'sales-history' in request.path %}active{% endif %}">
                <i class="fas fa-chart-bar"></i>
                <span>Sales History</span>
            </a>
            <a href="{% url 'low-stock' %}" class="nav-link {% if 'low-stock' in request.path %}active{% endif %}">
                <i class="fas fa-exclamation-triangle"></i>
                <span>Low Stock</span>
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="{% static 'js/api.js' %}"></script>
    <script src="{% static 'js/app.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
